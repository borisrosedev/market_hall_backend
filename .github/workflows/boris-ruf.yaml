name: Ruff Auto-Fix
run-name: ${{ github.actor }} running ruff auto-fix

on:
  push:
    branches:
      - boris-rose-dev
      - development
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  ruff-auto-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff


      - name: Run Ruff auto-fix
        run: |
          ruff check --fix .
          ruff format .


      - name: Create Pull Request with fixes
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "ci(ruff): auto-fix lint & format"
          title: "ci(ruff): auto-fix Ruff corrections for ${{ github.ref_name }}"
          body: |
            This PR was automatically generated by the Ruff auto-fix workflow.

            Actions performed:
            - `ruff check --fix .`
            - `ruff format .`

            Note: Some issues (e.g., F821 undefined names) may still require manual fixes.
          branch: boris-ruff-fixes/${{ github.ref_name }}
          base: ${{ github.ref_name }}
          labels: ci, lint, ruff
          signoff: true
          delete-branch: true
