name: boris-pytest
run-name: ${{ github.actor }} running boris-pytest

on:
  push:
    branches:
      - boris-rose-dev
      - development

permissions:
  contents: read

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Test with pytest (JUnit + XML + HTML coverage)
        run: |
          pytest tests.py --doctest-modules \
            --junitxml=junit.xml \
            --cov=com --cov-branch \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov

      - name: Upload pytest test results (artifact)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: junit.xml

      - name: Upload coverage.xml (artifact)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Upload HTML coverage (artifact)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov

      # === Codecov : couverture ===
      - name: Upload coverage to Codecov
        if: ${{ always() }}
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}   # requis pour repo privé (recommandé en v4)
          fail_ci_if_error: false
          verbose: true

      # === Codecov : résultats de tests (JUnit) ===
      - name: Upload JUnit to Codecov (Test Analytics)
        if: ${{ always() }}
        uses: codecov/test-results-action@v1
        with:
          files: junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  publish-coverage-pages:
    needs: python-tests
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download HTML coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-html
          path: htmlcov

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: htmlcov

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
