name: Ruff
run-name: ${{ github.actor }} running boris-ruff

on:
  push:
    branches:
      - boris-rose-dev
      - development
  pull_request:

jobs:
  ruff-linting:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint code with Ruff
        run: ruff check --output-format=github --target-version=py39 .

      - name: Check code formatting with Ruff (non-blocking)
        run: ruff format --diff --target-version=py39 .
        continue-on-error: true
